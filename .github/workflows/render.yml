name: 🏏 Render Cricket Shorts

on:
  workflow_dispatch:
    inputs:
      skip_audio:
        description: "Skip audio generation"
        required: false
        default: "false"
        type: boolean
      skip_style:
        description: "Skip AI style generation"
        required: false
        default: "false"
        type: boolean

  schedule:
    - cron: "0 6 * * *"

jobs:
  render:
    name: 🎬 Generate Video
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install ffmpeg & Chrome deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2

      - name: 🎨 Generate AI style (Gemini)
        if: ${{ github.event.inputs.skip_style != 'true' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-style.js

      - name: 🎙️ Generate voiceover (ElevenLabs)
        if: ${{ github.event.inputs.skip_audio != 'true' }}
        env:
          ELEVENLABS_KEY_1: ${{ secrets.ELEVENLABS_KEY_1 }}
          ELEVENLABS_KEY_2: ${{ secrets.ELEVENLABS_KEY_2 }}
          ELEVENLABS_KEY_3: ${{ secrets.ELEVENLABS_KEY_3 }}
        run: node scripts/generate-audio.js

      - name: 🎬 Render video (60fps)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_KEY_1: ${{ secrets.ELEVENLABS_KEY_1 }}
          ELEVENLABS_KEY_2: ${{ secrets.ELEVENLABS_KEY_2 }}
          ELEVENLABS_KEY_3: ${{ secrets.ELEVENLABS_KEY_3 }}
        run: node scripts/render-video.js --skip-style --skip-audio

      - name: 📤 Upload video
        uses: actions/upload-artifact@v4
        with:
          name: cricket-shorts-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30

      - name: 📊 Summary
        run: |
          echo "## 🏏 Cricket Shorts Rendered! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Style | AI-Generated |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎬 FPS | 60 |" >> $GITHUB_STEP_SUMMARY
          ls -lh output/*.mp4 2>/dev/null | awk '{print "| 📊 Size | " $5 " |"}' >> $GITHUB_STEP_SUMMARY || true
