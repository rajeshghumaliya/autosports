name: 🏏 Render Cricket Shorts

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      skip_audio:
        description: "Skip audio generation (use existing audio)"
        required: false
        default: "false"
        type: boolean

  # Daily at 6:00 AM UTC (11:30 AM IST)
  schedule:
    - cron: "0 6 * * *"

jobs:
  render:
    name: 🎬 Generate Video
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Node.js Setup ────────────────────────────────
      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ── Install Dependencies ──────────────────────────
      - name: 📦 Install npm dependencies
        run: npm ci

      # ── Install System Dependencies ──────────────────
      - name: 🔧 Install ffmpeg & Chrome dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2

      # ── Generate Audio (ElevenLabs TTS) ──────────────
      - name: 🎙️ Generate voiceover audio
        if: ${{ github.event.inputs.skip_audio != 'true' }}
        env:
          ELEVENLABS_KEY_1: ${{ secrets.ELEVENLABS_KEY_1 }}
          ELEVENLABS_KEY_2: ${{ secrets.ELEVENLABS_KEY_2 }}
          ELEVENLABS_KEY_3: ${{ secrets.ELEVENLABS_KEY_3 }}
        run: node scripts/generate-audio.js

      # ── Render Video ──────────────────────────────────
      - name: 🎬 Render video with Remotion
        env:
          ELEVENLABS_KEY_1: ${{ secrets.ELEVENLABS_KEY_1 }}
          ELEVENLABS_KEY_2: ${{ secrets.ELEVENLABS_KEY_2 }}
          ELEVENLABS_KEY_3: ${{ secrets.ELEVENLABS_KEY_3 }}
        run: node scripts/render-video.js ${{ github.event.inputs.skip_audio == 'true' && '--skip-audio' || '' }}

      # ── Upload Output ────────────────────────────────
      - name: 📤 Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: cricket-shorts-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30

      # ── Summary ──────────────────────────────────────
      - name: 📊 Print summary
        run: |
          echo "## 🏏 Cricket Shorts Rendered! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Output | \`output/\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔊 Audio | ${{ github.event.inputs.skip_audio == 'true' && 'Skipped' || 'Generated' }} |" >> $GITHUB_STEP_SUMMARY
          ls -lh output/*.mp4 2>/dev/null | awk '{print "| 📊 Size | " $5 " |"}' >> $GITHUB_STEP_SUMMARY || true
